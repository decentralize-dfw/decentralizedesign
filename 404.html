<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decentralize Design</title>
<meta name="robots" content="noindex, follow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
img{display:block;width:100%;height:100%;object-fit:cover}
</style>
<script>
// GitHub Pages SPA deep link support — save path, redirect instantly
(function(){
  var path = window.location.pathname;
  var search = window.location.search;
  if (path && path !== '/') {
    sessionStorage.setItem('spaRedirect', path + (search || ''));
  }
  window.location.replace('/');
})();
</script>
</head>
<body>
<img src="https://static.wixstatic.com/media/54a996_d0e88ad785b546f080598d98a09aafc2~mv2.gif" alt="Decentralize Design">
</body>
</html>
